# ============================================================
# BharatAlpha — docker-compose.prod.yml
# ============================================================

version: "3.9"

services:
  bharatalpha:
    image: bharatalpha:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bharatalpha_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Persist research reports and output JSON across restarts
      - bharatalpha_output:/app/output
      # Persist user watchlist
      - bharatalpha_watchlist:/app/watchlist
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  bharatalpha_output:
    driver: local
  bharatalpha_watchlist:
    driver: local
