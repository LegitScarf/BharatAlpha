# ============================================================
# BharatAlpha — config/universe.yaml
# ============================================================
# Nifty 500 universe organized by sector.
# Used by stock_screener_agent to filter candidates.
#
# screener_symbol: used for screener.in URLs
# nse_symbol:      used for NSE API calls
# angel_symbol:    used for Angel One SmartAPI
# weight:          Nifty 500 index weight tier (1=large, 2=mid, 3=small)
# ============================================================

meta:
  last_updated: "2026-02-26"
  total_stocks: 120
  index: "Nifty 500"
  note: "Representative subset — expand as needed"

# ── Screening filters (used by stock_screener_agent) ─────────
screening_defaults:
  min_market_cap_cr: 5000          # Minimum ₹5,000 Cr market cap
  max_pe_ratio: 60                 # Exclude extremely overvalued stocks
  min_roe: 10                      # Minimum 10% Return on Equity
  min_promoter_holding: 25         # Minimum 25% promoter stake
  max_debt_to_equity: 2.0          # Exclude highly leveraged (ex-financials)
  max_pledge_pct: 30               # Flag if promoter pledge > 30%
  min_revenue_growth_3yr: 5        # 3-year revenue CAGR > 5%
  target_candidates: 25            # Number of stocks to shortlist per run

# ── Sector weightings for portfolio construction ─────────────
sector_weights:
  Financial Services:         0.33
  Information Technology:     0.13
  Oil & Gas:                  0.12
  Fast Moving Consumer Goods: 0.09
  Automobile:                 0.08
  Healthcare:                 0.07
  Metals & Mining:            0.05
  Capital Goods:              0.05
  Telecom:                    0.03
  Chemicals:                  0.03
  Real Estate:                0.02

