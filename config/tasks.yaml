# ============================================================
# BharatAlpha — config/tasks.yaml
# ============================================================
# CONTEXT CHAIN STRATEGY:
#   Each task receives only the minimum context it needs.
#   Full JSON outputs are trimmed to avoid bloating prompts
#   and hitting Anthropic's 50k TPM rate limit on Haiku.
# ============================================================

analyze_market_context:
  description: >
    Fetch and analyse the current Indian equity market environment.

    TOOL USAGE (IN ORDER):
    1. Call get_market_context() — fetches Nifty indices, India VIX,
       advance/decline, sector data. Validate status='success'.
    2. Call get_fii_dii_flows(days=10) — fetches 10-day FII/DII flows.

    Determine: market_bias (bullish/neutral/bearish), volatility_regime,
    strong/weak sectors, institutional flow alignment, key macro risks.
    NEVER fabricate index levels or flow numbers.

  expected_output: >
    JSON with this structure (be concise — keep under 800 tokens):
    {
      "task": "market_context",
      "timestamp": "<ISO IST>",
      "market_bias": "<bullish|neutral|bearish>",
      "volatility_regime": "<low|medium|high>",
      "india_vix": <float or null>,
      "nifty50": {"level": <float>, "change_pct": <float>},
      "institutional_flows": {"fii_net_10d_cr": <float>, "dii_net_10d_cr": <float>, "institutional_bias": "<bullish|neutral|bearish>"},
      "sector_rotation": {"strong_sectors": ["<s1>","<s2>"], "weak_sectors": ["<s1>","<s2>"]},
      "key_risks": ["<r1>","<r2>","<r3>"],
      "macro_commentary": "<2 sentence summary>",
      "data_gaps": [],
      "confidence": <float>
    }

  agent: market_context_agent
  output_file: output/01_market_context.json
  config: {}


screen_universe:
  description: >
    Screen the Nifty 500 universe to identify 20-25 candidates.

    CONTEXT: Use market_bias from prior task to tilt sector selection.
    - bullish: include cyclicals (Metals, Auto, Real Estate)
    - bearish: prefer defensives (FMCG, Pharma, IT)
    - neutral: balanced

    Apply filters: Market cap >5000Cr, P/E <60, ROE >10%, Promoter >25%.
    Target 20-25 stocks across 5+ sectors. Use your market knowledge.

  expected_output: >
    JSON (keep under 1000 tokens):
    {
      "task": "screen_universe",
      "market_bias_applied": "<bullish|neutral|bearish>",
      "candidates": [
        {"symbol": "<NSE>", "company": "<name>", "sector": "<sector>", "priority": "<high|medium>", "weight_tier": <1|2|3>}
      ],
      "sector_distribution": {"<sector>": <count>},
      "confidence": <float>
    }

  agent: stock_screener_agent
  context:
    - analyze_market_context
  output_file: output/02_screened_candidates.json
  config: {}


analyze_fundamentals:
  description: >
    Fundamental analysis on the top 3 HIGH-PRIORITY candidates only
    (weight_tier=1 or priority=high from screen_universe).
    Analyse exactly 3 stocks — no more.

    TOOL USAGE for each stock (one call per stock only):
    1. get_screener_fundamentals(symbol) — fetches P/E, P/B, ROE, ROCE,
       D/E, EPS growth. Do NOT call any other tools.

    Assign fundamental_score 0.0-1.0:
    0.8+: attractive valuation + strong profitability
    0.6-0.8: fair value, good quality
    0.4-0.6: average
    <0.4: expensive or weak
    NEVER invent ratios. Use ONLY numbers returned by the tool.

  expected_output: >
    JSON (keep under 1500 tokens):
    {
      "task": "fundamental_analysis",
      "results": [
        {
          "symbol": "<NSE>", "company": "<name>", "sector": "<sector>",
          "pe_ratio": <float|null>, "pb_ratio": <float|null>,
          "roe": <float|null>, "roce": <float|null>,
          "debt_to_equity": <float|null>, "revenue_growth_3yr": <float|null>,
          "fundamental_score": <float>,
          "score_rationale": "<1 sentence>",
          "data_quality": "<complete|partial|limited>"
        }
      ],
      "top_picks_fundamental": ["<s1>","<s2>","<s3>"],
      "confidence": <float>
    }

  agent: fundamental_analyst_agent
  context:
    - screen_universe
  output_file: output/03_fundamental_analysis.json
  config: {}


analyze_technicals:
  description: >
    Technical analysis for the top 3 stocks from analyze_fundamentals
    (those with highest fundamental_score).

    TOOL USAGE for each stock:
    1. get_angel_historical_data(symbol, days=60) — 60 days OHLCV only
    2. get_angel_quote(symbol) — current price

    Compute: 20-day SMA, RSI(14), support/resistance.
    Assign technical_score 0.0-1.0. NEVER invent prices.
    Analyse exactly 3 stocks — no more.

  expected_output: >
    JSON (keep under 1200 tokens):
    {
      "task": "technical_analysis",
      "results": [
        {
          "symbol": "<NSE>",
          "current_price": <float|null>,
          "above_50dma": <true|false|null>,
          "above_200dma": <true|false|null>,
          "rsi_14": <float|null>,
          "trend_direction": "<uptrend|downtrend|sideways>",
          "support": <float|null>, "resistance": <float|null>,
          "technical_score": <float>,
          "score_rationale": "<1 sentence>"
        }
      ],
      "confidence": <float>
    }

  agent: technical_analyst_agent
  context:
    - analyze_fundamentals
  output_file: output/04_technical_analysis.json
  config: {}


assess_sentiment:
  description: >
    Sentiment analysis for the same 3 stocks from analyze_fundamentals.

    TOOL USAGE for each stock (2 calls max per stock):
    1. get_rss_news(symbol, company_name) — recent headlines only
    2. get_bse_announcements(symbol, days_back=3) — last 3 days only
    Skip get_nse_corporate_actions to reduce token usage.

    Assign sentiment_score 0.0-1.0. NEVER fabricate news events.
    Analyse exactly 3 stocks — no more.

  expected_output: >
    JSON (keep under 1000 tokens):
    {
      "task": "sentiment_analysis",
      "results": [
        {
          "symbol": "<NSE>",
          "sentiment_score": <float>,
          "key_signals": ["<signal1>","<signal2>"],
          "upcoming_catalysts": ["<c1>"],
          "score_rationale": "<1 sentence>"
        }
      ],
      "overall_market_sentiment": "<positive|neutral|negative>",
      "confidence": <float>
    }

  agent: sentiment_analyst_agent
  context:
    - analyze_fundamentals
  output_file: output/05_sentiment_analysis.json
  config: {}


evaluate_risk:
  description: >
    Risk assessment for all analysed stocks.

    TOOL USAGE:
    1. get_nse_shareholding_pattern(symbol) — promoter pledge check

    Also use fundamental data (D/E, interest coverage) and sentiment
    (regulatory/management risk signals) from prior tasks.

    Assign risk_score 0.0-1.0 (1.0 = HIGHEST RISK).
    risk_score is INVERTED in composite — high risk lowers final score.

  expected_output: >
    JSON (keep under 800 tokens):
    {
      "task": "risk_assessment",
      "results": [
        {
          "symbol": "<NSE>",
          "promoter_pledge_pct": <float|null>,
          "pledge_flag": <true|false>,
          "risk_flags": ["<flag1>"],
          "risk_score": <float>,
          "recommendation": "<include|caution|exclude>"
        }
      ],
      "excluded_stocks": ["<symbol>"],
      "confidence": <float>
    }

  agent: risk_analyst_agent
  context:
    - analyze_fundamentals
    - assess_sentiment
  output_file: output/06_risk_assessment.json
  config: {}


construct_portfolio:
  description: >
    Build the final portfolio by synthesising all prior scores.

    COMPOSITE FORMULA:
      composite = (fundamental_score * 0.40)
                + (technical_score   * 0.30)
                + (sentiment_score   * 0.20)
                + ((1 - risk_score)  * 0.10)

    BUY: composite >= 0.65 | HOLD: 0.45-0.65 | AVOID: < 0.45
    Select top 3-5 BUY stocks. Max 40% per sector.
    Set entry zone from technical support, target +15-25%, stop -8-12%.

  expected_output: >
    JSON (keep under 1500 tokens):
    {
      "task": "portfolio_construction",
      "macro_bias": "<bullish|neutral|bearish>",
      "composite_scores": [
        {
          "symbol": "<NSE>", "company": "<name>", "sector": "<sector>",
          "fundamental_score": <float>, "technical_score": <float>,
          "sentiment_score": <float>, "risk_score": <float>,
          "composite_score": <float>, "recommendation": "<BUY|HOLD|AVOID>"
        }
      ],
      "portfolio": [
        {
          "symbol": "<NSE>", "company": "<name>", "sector": "<sector>",
          "composite_score": <float>, "recommendation": "BUY",
          "position_size_pct": <float>,
          "current_price": <float|null>,
          "entry_zone": "<e.g. 1450-1500>",
          "target_price_12m": <float|null>,
          "stop_loss": <float|null>,
          "upside_pct": <float|null>,
          "investment_thesis": "<2 sentence thesis>"
        }
      ],
      "portfolio_metrics": {
        "total_stocks": <int>,
        "sector_allocation": {"<sector>": <pct>},
        "avg_composite_score": <float>,
        "portfolio_beta_estimate": "<low|moderate|high>"
      },
      "confidence": <float>
    }

  agent: portfolio_manager_agent
  context:
    - analyze_fundamentals
    - analyze_technicals
    - assess_sentiment
    - evaluate_risk
  output_file: output/07_portfolio_construction.json
  config: {}


generate_report:
  description: >
    Generate a professional equity research report from the portfolio
    and analysis results.

    FORMAT:
    Return a structured JSON with the following schema:
    {
      "executive_summary": "Overall market and portfolio summary. Include 2-3 paragraphs. End with the verbatim disclaimer: This report is generated by an AI system for informational and educational purposes only. It does not constitute investment advice. Please consult a SEBI-registered investment advisor before making any investment decisions. BharatAlpha is not SEBI registered.",
      "market_backdrop": "2-3 sentences max from market context.",
      "portfolio_recommendations": [
         {
           "company": "COMPANY NAME",
           "symbol": "SYMBOL",
           "action": "BUY | HOLD | AVOID",
           "target": 1234.5,
           "composite_score": 0.85,
           "thesis": "2-3 sentences",
           "fundamentals": "Key fundamentals",
           "technicals": "Key technicals",
           "risks": ["Risk 1", "Risk 2"]
         }
      ],
      "portfolio_overview": {
         "Total Stocks": 5,
         "Sector Allocations": {"IT": "40%", "Bank": "60%"}
      }
    }
    
    All numbers must match prior task outputs exactly.
    Do not wrap the output in markdown fences, output ONLY raw valid JSON.

  expected_output: >
    Raw JSON string mapping exactly to the expected JSON schema.

  agent: report_generator_agent
  context:
    - analyze_market_context
    - construct_portfolio
  output_file: output/08_research_report.json
  config: {}